<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirelytics AI Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f4faff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        accent: {
                            purple: '#8b5cf6',
                            teal: '#14b8a6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion/dist/framer-motion.js"></script>

    <!-- Lucide Icons (Vanilla script fallback to build custom React icon components easily below) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased min-h-screen text-slate-800">
    <div id="error-log"
        style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;">
    </div>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            document.getElementById('error-log').innerText += 'Error: ' + message + '\nAt: ' + source + ':' + lineno + '\n\n';
            if (error && error.stack) {
                document.getElementById('error-log').innerText += error.stack + '\n\n';
            }
        };
        window.addEventListener('unhandledrejection', function (event) {
            document.getElementById('error-log').innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n\n';
        });
    </script>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;
        const { motion, AnimatePresence } = window.Motion;
        const {
            PieChart, Pie, Cell, ResponsiveContainer, Tooltip,
            BarChart, Bar, XAxis, YAxis, CartesianGrid,
            AreaChart, Area, LineChart, Line, Legend, ReferenceArea
        } = window.Recharts;

        // Custom Icon wrapper to use Lucide easily without the standard React package
        const Icon = ({ name, size = 24, className = '', color = 'currentColor' }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size, stroke: color, 'stroke-width': 2 }
                    });
                }
            }, [name, size, className, color]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // --- COMPONENTS ---

        // 1. Sidebar Component
        const Sidebar = ({ activeTab, setActiveTab, onLogout }) => {
            const tabs = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'progress', label: 'Progress', icon: 'trending-up' },
                { id: 'history', label: 'History', icon: 'history' },
                { id: 'levelup', label: 'Level Up', icon: 'zap' }
            ];

            const bottomTabs = [
                { id: 'profile', label: 'Profile', icon: 'user' },
                { id: 'logout', label: 'Log Out', icon: 'log-out' }
            ];

            return (
                <div className="w-64 h-screen fixed left-0 top-0 glass-card !rounded-none !border-l-0 !border-t-0 !border-b-0 border-r flex flex-col pt-8 pb-4 z-50">
                    <div className="px-8 mb-12">
                        <div className="flex items-center gap-3 mb-1">
                            <img src="logo.png" alt="Hirelytics Logo" className="w-8 h-8 object-contain drop-shadow-md" />
                            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-700 to-accent-purple truncate">Hirelytics</h1>
                        </div>
                        <p className="text-xs text-brand-600 font-medium tracking-wider uppercase">Menu</p>
                    </div>

                    <nav className="flex-1 px-4 space-y-2">
                        {tabs.map((tab) => (
                            <motion.button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                whileHover={{ x: 5 }}
                                whileTap={{ scale: 0.95 }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors relative text-left ${activeTab === tab.id ? 'text-brand-700 font-semibold' : 'text-slate-500 hover:text-brand-600 hover:bg-brand-50/50'
                                    }`}
                            >
                                {activeTab === tab.id && (
                                    <motion.div
                                        layoutId="activeSlide"
                                        className="absolute inset-0 bg-brand-100/50 rounded-xl border border-brand-200 shadow-[0_0_15px_rgba(14,165,233,0.15)]"
                                        transition={{ type: 'spring', stiffness: 300, damping: 30 }}
                                    />
                                )}
                                <span className="relative z-10 flex items-center gap-3">
                                    <Icon name={tab.icon} size={20} />
                                    {tab.label}
                                </span>
                            </motion.button>
                        ))}
                    </nav>

                    <div className="px-4 mt-auto space-y-2">
                        <p className="px-4 text-xs text-brand-600 font-medium tracking-wider uppercase mb-2">System</p>
                        {bottomTabs.map((tab) => (
                            <motion.button
                                key={tab.id}
                                onClick={() => tab.id === 'logout' ? onLogout() : setActiveTab(tab.id)}
                                whileHover={{ x: 5, backgroundColor: tab.id === 'logout' ? 'rgba(239,68,68,0.05)' : 'rgba(14,165,233,0.05)' }}
                                whileTap={{ scale: 0.95 }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors text-left ${activeTab === tab.id && tab.id !== 'logout' ? 'text-brand-700 font-semibold' : ''} ${tab.id === 'logout' ? 'text-red-500 hover:text-red-600' : 'text-slate-500 hover:text-brand-600'}`}
                            >
                                <Icon name={tab.icon} size={20} />
                                <span className="font-medium">{tab.label}</span>
                            </motion.button>
                        ))}
                    </div>
                </div>
            );
        };

        // 2. Top Header Component
        const TopHeader = ({ onUploadClick }) => {
            return (
                <div className="flex justify-between items-center mb-8">
                    <div>
                        <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Interview Overview</h2>
                        <p className="text-slate-500 mt-1">Review your latest performance metrics.</p>
                    </div>
                    <div className="flex gap-4">
                        <motion.button
                            whileHover={{ scale: 1.05, y: -2 }}
                            whileTap={{ scale: 0.95 }}
                            className="glass-card flex items-center gap-2 px-6 py-3 font-semibold text-brand-700 hover:text-brand-800 transition-colors shadow-sm"
                        >
                            <Icon name="play-circle" size={20} />
                            Start Interview
                        </motion.button>

                        <motion.button
                            onClick={onUploadClick}
                            whileHover={{ scale: 1.05, y: -2 }}
                            whileTap={{ scale: 0.95 }}
                            className="bg-gradient-to-r from-brand-500 to-accent-teal text-white flex items-center gap-2 px-6 py-3 rounded-xl font-semibold shadow-[0_10px_20px_rgba(20,184,166,0.3)] hover:shadow-[0_15px_30px_rgba(20,184,166,0.4)] transition-all"
                        >
                            <motion.div animate={{ y: [0, -3, 0] }} transition={{ repeat: Infinity, duration: 2 }}>
                                <Icon name="cloud-upload" size={20} />
                            </motion.div>
                            Upload Interview
                        </motion.button>
                    </div>
                </div>
            );
        };

        // 3. Card Wrapper Component
        const Card = ({ title, icon, children, className = "" }) => (
            <motion.div
                whileHover={{ y: -4, transition: { duration: 0.2 } }}
                className={`glass-card p-6 flex flex-col overflow-hidden ${className}`}
            >
                <div className="flex items-center gap-3 mb-4">
                    {icon && <div className="p-2 bg-brand-100 rounded-lg text-brand-600"><Icon name={icon} size={18} /></div>}
                    <h3 className="font-semibold text-slate-800 text-lg tracking-tight">{title}</h3>
                </div>
                <div className="flex-1 relative">
                    {children}
                </div>
            </motion.div>
        );

        // -- SPECIFIC CHART / CONTENT COMPONENTS --

        const TimestampIssues = ({ onSelectIssue, selectedIssue }) => {
            const issues = [
                { id: 1, time: '0:32', label: 'Fumbled', type: 'warning' },
                { id: 2, time: '0:40', label: 'Technically wrong understanding', type: 'error' },
                { id: 3, time: '0:52', label: 'Less relevency', type: 'warning' },
                { id: 4, time: '0:56', label: 'Good depth of answer', type: 'success' },
                { id: 5, time: '1:05', label: 'Upward inflection', type: 'info' },
                { id: 6, time: '1:15', label: 'You bounced back!', type: 'success' },
            ];

            const getTypeColors = (type) => {
                switch (type) {
                    case 'error': return 'border-red-400 ring-red-100 text-red-700 bg-red-50';
                    case 'warning': return 'border-orange-400 ring-orange-100 text-orange-700 bg-orange-50';
                    case 'success': return 'border-emerald-400 ring-emerald-100 text-emerald-700 bg-emerald-50';
                    default: return 'border-brand-400 ring-brand-100 text-brand-700 bg-brand-50';
                }
            };

            return (
                <div className="relative pl-4 overflow-y-auto h-[200px] pr-2 custom-scrollbar">
                    <div className="absolute left-6 top-2 bottom-2 w-0.5 bg-slate-200"></div>
                    {issues.map((issue, idx) => {
                        const isSelected = selectedIssue?.id === issue.id;
                        const colors = getTypeColors(issue.type);
                        const borderColor = colors.split(' ')[0];
                        const ringColor = colors.split(' ')[1];
                        const textColor = colors.split(' ')[2];
                        const bgColor = colors.split(' ')[3];

                        return (
                            <motion.div
                                key={issue.id}
                                initial={{ opacity: 0, x: -10 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ delay: idx * 0.1 }}
                                onClick={() => onSelectIssue && onSelectIssue(issue)}
                                className={`relative flex items-center gap-4 mb-4 group cursor-pointer ${isSelected ? 'opacity-100' : 'opacity-80 hover:opacity-100'}`}
                            >
                                <div className={`z-10 bg-white border-2 w-4 h-4 rounded-full transition-all ${borderColor} ${isSelected ? `scale-125 ring-4 ${ringColor}` : `group-hover:scale-125 group-hover:ring-4 ${ringColor} shadow-sm`}`}></div>
                                <div className={`flex-1 p-2 rounded-lg transition-colors border max-w-[200px] ${isSelected ? `${bgColor} border-current border-opacity-20` : 'border-transparent group-hover:bg-slate-50'}`}>
                                    <span className={`font-semibold w-12 inline-block ${textColor}`}>{issue.time}</span>
                                    <span className={`font-medium ${isSelected ? textColor : 'text-slate-600'} text-sm leading-tight inline-block align-top max-w-[120px] pb-1`}>{issue.label}</span>
                                </div>
                            </motion.div>
                        );
                    })}
                </div>
            );
        };

        const SelectionPieChart = () => {
            const data = [
                { name: 'Selected', value: 75, color: '#0ea5e9' },
                { name: 'Rejected', value: 25, color: '#bae6fd' }
            ];
            const [activeIndex, setActiveIndex] = useState(0);

            const onPieEnter = (_, index) => {
                setActiveIndex(index);
            };

            return (
                <div className="h-full min-h-[220px] w-full relative flex items-center justify-center">
                    <ResponsiveContainer width="100%" height="100%">
                        <PieChart>
                            <Pie
                                data={data}
                                cx="50%"
                                cy="50%"
                                innerRadius={60}
                                outerRadius={85}
                                paddingAngle={5}
                                dataKey="value"
                                cornerRadius={10}
                                onMouseEnter={onPieEnter}
                                stroke="none"
                            >
                                {data.map((entry, index) => (
                                    <Cell key={`cell-${index}`} fill={entry.color}
                                        style={{
                                            filter: `drop-shadow(0px 10px 10px ${entry.color}50)`,
                                            transform: activeIndex === index ? 'scale(1.05)' : 'scale(1)',
                                            transformOrigin: 'center',
                                            transition: 'all 0.3s ease'
                                        }}
                                    />
                                ))}
                            </Pie>
                            <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 25px rgba(0,0,0,0.1)' }} />
                        </PieChart>
                    </ResponsiveContainer>
                    <div className="absolute flex flex-col items-center justify-center pointer-events-none">
                        <span className="text-3xl font-bold text-slate-800">75%</span>
                        <span className="text-xs text-slate-500 font-medium uppercase tracking-widest">Chance</span>
                    </div>
                </div>
            );
        };

        const PacingTrendChart = () => {
            const data = [
                { time: '0m', wpm: 120 }, { time: '5m', wpm: 145 }, { time: '10m', wpm: 130 },
                { time: '15m', wpm: 160 }, { time: '20m', wpm: 125 }
            ];
            return (
                <div className="h-full min-h-[100px] w-full">
                    <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={data} margin={{ top: 5, right: 5, left: -25, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                            <XAxis dataKey="time" axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 10 }} dy={5} />
                            <YAxis axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 10 }} />
                            <Tooltip contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }} />
                            <Line type="monotone" dataKey="wpm" stroke="#8b5cf6" strokeWidth={3} dot={{ r: 4, fill: '#8b5cf6' }} animationDuration={1500} />
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const PauseAnalysisChart = () => {
            const data = [
                { name: 'Awkward', value: 3, fill: '#ef4444' },
                { name: 'Natural', value: 12, fill: '#10b981' },
                { name: 'Quick', value: 8, fill: '#3b82f6' }
            ];
            return (
                <div className="h-full min-h-[100px] w-full">
                    <ResponsiveContainer width="100%" height="100%">
                        <BarChart layout="vertical" data={data} margin={{ top: 0, right: 20, left: 10, bottom: 0 }}>
                            <XAxis type="number" hide />
                            <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 11, fontWeight: 500 }} />
                            <Tooltip cursor={{ fill: 'transparent' }} contentStyle={{ borderRadius: '8px', border: 'none' }} />
                            <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={14} animationDuration={1500}>
                                {data.map((entry, index) => (
                                    <Cell key={`cell-${index}`} fill={entry.fill} />
                                ))}
                            </Bar>
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const WeaknessesChart = () => {
            const data = [
                { name: 'Eye Contact', value: 80 },
                { name: 'Vagueness', value: 65 },
                { name: 'Conciseness', value: 45 },
            ];

            return (
                <div className="h-full min-h-[200px] w-full">
                    <ResponsiveContainer width="100%" height="100%">
                        <BarChart layout="vertical" data={data} margin={{ top: 0, right: 20, left: 20, bottom: 0 }}>
                            <XAxis type="number" hide />
                            <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 12, fontWeight: 500 }} />
                            <Tooltip cursor={{ fill: 'transparent' }} contentStyle={{ borderRadius: '12px', border: 'none' }} />
                            <Bar dataKey="value" fill="#14b8a6" radius={[0, 6, 6, 0]} barSize={20} animationDuration={2000}>
                                {data.map((entry, index) => (
                                    <Cell key={`cell-${index}`} fill={index === 0 ? '#ef4444' : index === 1 ? '#f59e0b' : '#14b8a6'} />
                                ))}
                            </Bar>
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const EnergyAreaChart = () => {
            const data = [
                { time: '0m', energy: 60 }, { time: '5m', energy: 80 }, { time: '10m', energy: 75 },
                { time: '15m', energy: 90 }, { time: '20m', energy: 65 }, { time: '25m', energy: 85 }
            ];

            return (
                <div className="h-full min-h-[200px] w-full">
                    <ResponsiveContainer width="100%" height="100%">
                        <AreaChart data={data} margin={{ top: 10, right: 0, left: -25, bottom: 0 }}>
                            <defs>
                                <linearGradient id="colorEnergy" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="5%" stopColor="#38bdf8" stopOpacity={0.8} />
                                    <stop offset="95%" stopColor="#38bdf8" stopOpacity={0} />
                                </linearGradient>
                            </defs>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                            <XAxis dataKey="time" axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 12 }} dy={10} />
                            <YAxis axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: 12 }} />
                            <Tooltip contentStyle={{ borderRadius: '12px', border: 'none' }} />
                            <Area type="monotone" dataKey="energy" stroke="#0284c7" strokeWidth={3} fillOpacity={1} fill="url(#colorEnergy)" animationDuration={2000} />
                        </AreaChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        // 4. Hero Insights Card (Complex Interactive Component)
        const AIInsights = ({ selectedIssue }) => {
            const [activeTab, setActiveTab] = useState('suggestions');
            const [generatedText, setGeneratedText] = useState("");

            useEffect(() => {
                if (selectedIssue) {
                    setActiveTab('issue_context');
                }
            }, [selectedIssue]);

            const getIssueContextText = (issue) => {
                if (!issue) return "";
                switch (issue.label) {
                    case 'Technically wrong understanding':
                        return `Problem (at ${issue.time}): You conflated Server-Side Rendering (SSR) with Static Site Generation (SSG) when asked about Next.js data fetching.\n\nTechnical Solution: Clearly distinguish that SSR computes the page on every request (via getServerSideProps) while SSG builds the HTML at compile time (getStaticProps). Next time, give a precise example: use SSG for a marketing site, and SSR for a live dashboard.`;
                    case 'Less relevency':
                        return `Problem (at ${issue.time}): The interviewer asked how you manage application state, but you rambled about CSS framework decisions.\n\nSolution: Answer the core prompt first. Say "I used Redux Toolkit for global state," and briefly explain why, before moving onto UI layer details if necessary. Keep tangents under 15 seconds.`;
                    case 'Good depth of answer':
                        return `Highlight (at ${issue.time}): You provided an excellent, multi-layered explanation of database indexing.\n\nWhy it worked: You started with a high-level analogy (a book's index) to show clear communication skills, then proved your technical mastery by diving into B-Trees.`;
                    case 'You bounced back!':
                        return `Highlight (at ${issue.time}): After briefly fumbling the microservices question, you took a sharp breath, paused, and completely nailed the rest of the breakdown.\n\nKeep it up: Interviewers love candidates who show composure under pressure. Recovering gracefully is a huge positive signal.`;
                    default:
                        return `Analysis (at ${issue.time}): You triggered a ${issue.label} flag.\n\nSolution: Go back to the recording at this exact timestamp. Practice delivering this specific paragraph in the 'Practice' module to build muscle memory and smooth out delivery.`;
                }
            };

            const contentMap = {
                issue_context: getIssueContextText(selectedIssue),
                suggestions: "Instead of saying 'I sort of did the full-stack work', explicitly state your ownership: 'I architected and led the development of both the frontend UI in React and the backend Node.js APIs, improving system load times by 40%.'",
                tips: "• Maintain stronger eye contact with the camera.\n• Pause for 1 second before answering complex questions.\n• Vary your tone to emphasize key project achievements."
            };

            // Typing Effect simulation
            useEffect(() => {
                setGeneratedText("");
                let i = 0;
                const txt = contentMap[activeTab] || "";
                const speed = 15;

                let timeoutId;
                const typeWriter = () => {
                    if (i < txt.length) {
                        setGeneratedText(prev => prev + txt.charAt(i));
                        i++;
                        timeoutId = setTimeout(typeWriter, speed);
                    }
                };

                typeWriter();
                return () => clearTimeout(timeoutId);
            }, [activeTab, selectedIssue]);

            const tabs = [
                ...(selectedIssue ? [{ id: 'issue_context', label: 'Timeline Analysis' }] : []),
                { id: 'suggestions', label: 'Keyword Suggestions' },
                { id: 'tips', label: 'What & How to Say It' }
            ];

            return (
                <div className="glass-card flex flex-col overflow-hidden border-2 border-brand-200/50 shadow-[0_20px_50px_rgba(14,165,233,0.15)] col-span-1 md:col-span-2 lg:col-span-3">
                    <div className="bg-gradient-to-r from-brand-500 to-accent-purple p-6 text-white flex justify-between items-center relative overflow-hidden">
                        <div className="relative z-10">
                            <h2 className="text-2xl font-bold flex items-center gap-2">
                                <Icon name="sparkles" size={24} /> AI Analysis & Insights
                            </h2>
                            <p className="opacity-90 mt-1 font-medium">Actionable intelligence to perfect your next response.</p>
                        </div>
                        {/* Decorative background shapes */}
                        <div className="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                        <div className="absolute bottom-0 right-20 w-32 h-32 bg-accent-teal/20 rounded-full blur-2xl"></div>
                    </div>

                    <div className="p-6 flex flex-col md:flex-row gap-6">
                        {/* Tabs */}
                        <div className="flex flex-col gap-2 min-w-[200px]">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-3 rounded-xl text-left font-semibold transition-all ${activeTab === tab.id
                                        ? 'bg-brand-100 text-brand-700 shadow-sm'
                                        : 'text-slate-500 hover:bg-slate-50'
                                        }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 bg-white/50 border border-slate-100 rounded-2xl p-6 relative">
                            <motion.div
                                className="whitespace-pre-wrap text-slate-700 leading-relaxed font-medium"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                            >
                                {generatedText}
                                <span className="inline-block w-1 h-4 ml-1 bg-brand-500 animate-pulse"></span>
                            </motion.div>

                            <button className="absolute top-4 right-4 p-2 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors">
                                <Icon name="copy" size={18} />
                            </button>

                            <button className="group absolute bottom-4 right-4 p-3 flex items-center justify-center bg-gradient-to-r from-brand-500 to-accent-purple text-white shadow-lg hover:shadow-[0_10px_20px_rgba(14,165,233,0.3)] transition-all rounded-full animate-bounce z-10">
                                <span className="text-2xl select-none leading-none transition-transform duration-300 group-hover:scale-125">🤖</span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            const radius = 70;
            const levels = 4;
            const angleStep = (2 * Math.PI) / data.length;

            const getCoord = (angle, r) => ({
                x: center + r * Math.sin(angle),
                y: center - r * Math.cos(angle)
            });

            const gridPolygons = Array.from({ length: levels }, (_, i) => {
                const r = radius * ((i + 1) / levels);
                return data.map((_, j) => {
                    const { x, y } = getCoord(j * angleStep, r);
                    return `${x},${y}`;
                }).join(' ');
            });

            const valuePolygon = data.map((d, i) => {
                const r = radius * (d.value / 100);
                const { x, y } = getCoord(i * angleStep, r);
                return `${x},${y}`;
            }).join(' ');

            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                    <defs>
                        <linearGradient id="radarGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.6" />
                            <stop offset="100%" stopColor="#8b5cf6" stopOpacity="0.4" />
                        </linearGradient>
                    </defs>
                    {gridPolygons.map((pts, i) => (
                        <polygon key={i} points={pts} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                    ))}
                    {data.map((_, i) => {
                        const { x, y } = getCoord(i * angleStep, radius);
                        return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
                    })}
                    <polygon points={valuePolygon} fill="url(#radarGrad)" stroke="#0ea5e9" strokeWidth="2" />
                    {data.map((d, i) => {
                        const { x, y } = getCoord(i * angleStep, radius + 18);
                        return (
                            <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
                                fontSize="9" fontWeight="700" fill="#475569">{d.label}</text>
                        );
                    })}
                    {data.map((d, i) => {
                        const r = radius * (d.value / 100);
                        const { x, y } = getCoord(i * angleStep, r);
                        return <circle key={i} cx={x} cy={y} r={3} fill="#0ea5e9" />;

                                                    <p className={`text-sm font-bold ${completedTasks[i] ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task.task}</p>
                                                    <span className="text-[10px] font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded-full border border-brand-100 shrink-0">{task.day}</span>
                                                </div>
                                                <p className="text-xs text-slate-500 font-medium mt-0.5 leading-relaxed">{task.reason}</p>
                                            </div>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                            <div className="mt-4 flex items-center gap-3">
                                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <motion.div animate={{ width: `${(Object.values(completedTasks).filter(Boolean).length / practiceplan.length) * 100}%` }}
                                        transition={{ duration: 0.5 }} className="h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full" />
                                </div>
                                <span className="text-xs font-bold text-slate-600">
                                    {Object.values(completedTasks).filter(Boolean).length}/{practiceplan.length} done
                                </span>
                            </div>
                        </motion.div>

                        {/* Section 8: Skill Challenges */}
                        <motion.div whileHover={{ y: -4 }} className="glass-card p-6">
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Icon name="gamepad-2" size={18} /></div>
                                    <h3 className="font-semibold text-slate-800 text-lg">🎮 Skill Challenges</h3>
                                </div>
                                <div className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-xl">
                                    <span className="text-amber-500 text-base">⚡</span>
                                    <span className="text-xs font-black text-amber-700">{totalXP} XP</span>
                                </div>
                            </div>
                            <div className="flex flex-col gap-3">
                                {challenges.map((c, i) => (
                                    <motion.div key={c.id} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.08 }}
                                        className={`p-4 rounded-2xl border transition-all ${completedChallenges[c.id] ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200 hover:border-brand-200 hover:shadow-sm'
                                            }`}>
                                        <div className="flex items-start gap-3">
                                            <div className={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 ${c.color}`}>
                                                <Icon name={c.icon} size={16} />
                                            </div>
                                            <div className="flex-1">
                                                <p className={`text-sm font-bold ${completedChallenges[c.id] ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{c.goal}</p>
                                                <p className="text-xs text-slate-500 font-medium mt-0.5 leading-relaxed">{c.why}</p>
                                            </div>
                                            <div className="flex flex-col items-end gap-1.5 shrink-0">
                                                <span className="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-100">+{c.xp} XP</span>
                                                <button onClick={() => setCompletedChallenges(p => ({ ...p, [c.id]: !p[c.id] }))}
                                                    className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${completedChallenges[c.id] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 hover:border-brand-400'
                                                        }`}>
                                                    {completedChallenges[c.id] && <Icon name="check" size={12} />}
                                                </button>
                                            </div>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                        </motion.div>
                    </div>

                    {/* ── SECTION 9: IMPROVEMENT ROADMAP ── */}
                    <motion.div whileHover={{ y: -4 }} className="glass-card p-6 mb-8 border border-brand-100">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="p-2 bg-brand-100 rounded-lg text-brand-600"><Icon name="map" size={18} /></div>
                            <h3 className="font-semibold text-slate-800 text-lg">📈 Improvement Roadmap</h3>
                        </div>
                        <div className="relative">
                            {/* Connecting line */}
                            <div className="absolute top-5 left-5 right-5 h-0.5 bg-gradient-to-r from-brand-300 via-purple-300 to-slate-200 hidden sm:block" />
                            <div className="grid grid-cols-1 sm:grid-cols-4 gap-6">
                                {roadmapStages.map((s, i) => (
                                    <div key={i} className="flex flex-col items-center text-center gap-3 relative">
                                        <motion.div
                                            initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ delay: i * 0.15 }}
                                            className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm border-2 z-10 shadow-md transition-all ${s.status === 'active'
                                                    ? 'bg-gradient-to-br from-brand-500 to-accent-purple border-brand-400 text-white shadow-brand-200'
                                                    : 'bg-white border-slate-300 text-slate-400'
                                                }`}>
                                            {s.status === 'active' ? <Icon name={s.icon} size={16} /> : <span className="text-xs">{s.stage}</span>}
                                        </motion.div>
                                        <div>
                                            <p className={`text-xs font-bold ${s.status === 'active' ? 'text-brand-700' : 'text-slate-500'}`}>
                                                Stage {s.stage}: {s.label}
                                            </p>
                                            <p className="text-[10px] text-slate-400 font-medium mt-1 leading-tight">{s.desc}</p>
                                        </div>
                                        {s.status === 'active' && (
                                            <span className="text-[9px] font-black bg-brand-100 text-brand-700 px-2 py-0.5 rounded-full border border-brand-200">IN PROGRESS</span>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </motion.div>

                    {/* ── SECTION 10: AI FEEDBACK EVOLUTION ── */}
                    <motion.div whileHover={{ y: -4 }} className="glass-card p-6 border border-purple-100">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Icon name="bot" size={18} /></div>
                            <h3 className="font-semibold text-slate-800 text-lg">🤖 AI Feedback Evolution</h3>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {[
                                {
                                    label: 'Before', date: 'Session 1 — Oct 2025', badge: 'bg-red-100 text-red-600',
                                    feedback: '"You used 42 filler words across 20 minutes. Upward inflections reduced authority. Frequent awkward pauses (8) signal unstructured thinking."',
                                    stats: [{ name: 'Filler Words', val: 42, color: 'bg-red-400' }, { name: 'Awkward Pauses', val: 8, color: 'bg-red-300' }]
                                },
                                {
                                    label: 'After', date: 'Session 5 — Apr 2026', badge: 'bg-emerald-100 text-emerald-600',
                                    feedback: '"Only 9 filler words detected. Awkward pauses reduced to 5. Speaking pace now within optimal 130–155 WPM range. Excellent improvement!"',
                                    stats: [{ name: 'Filler Words', val: 9, color: 'bg-emerald-400' }, { name: 'Awkward Pauses', val: 5, color: 'bg-emerald-300' }]
                                }
                            ].map((item, i) => (
                                <motion.div key={i} initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.2 }}
                                    className={`rounded-2xl border p-5 ${i === 0 ? 'border-red-100 bg-red-50/40' : 'border-emerald-100 bg-emerald-50/40'}`}>
                                    <div className="flex items-center justify-between mb-3">
                                        <span className={`text-xs font-black px-3 py-1 rounded-full ${item.badge}`}>{item.label}</span>
                                        <span className="text-[10px] font-medium text-slate-400">{item.date}</span>
                                    </div>
                                    <p className="text-sm text-slate-600 font-medium leading-relaxed italic mb-4">{item.feedback}</p>
                                    <div className="flex flex-col gap-2">
                                        {item.stats.map((s, j) => (
                                            <div key={j}>
                                                <div className="flex justify-between text-xs font-bold mb-1">
                                                    <span className="text-slate-700">{s.name}</span>
                                                    <span className="text-slate-500">{s.val}</span>
                                                </div>
                                                <div className="h-1.5 bg-white rounded-full overflow-hidden">
                                                    <motion.div initial={{ width: 0 }} animate={{ width: `${Math.min(s.val * 2, 100)}%` }} transition={{ duration: 1, delay: j * 0.2 }}
                                                        className={`h-full rounded-full ${s.color}`} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {activeView === 'theory' && i === 1 && (
                                        <div className="mt-3 p-3 bg-white rounded-xl border border-emerald-100 text-xs text-emerald-700 font-medium leading-relaxed">
                                            Reduction in pauses indicates improved thought structuring. Consistent practice conditions new neural pathways for fluent speech.
                                        </div>
                                    )}
                                </motion.div>
                            ))}
                        </div>
                    </motion.div>

                </div>
            );
        };

        // --- PROFILE VIEW ---
        const ProfileView = () => {
            const [editMode, setEditMode] = useState(false);
            const stats = [
                { label: 'Interviews Taken', value: '14', icon: 'video', color: 'brand' },
                { label: 'Avg Score', value: '71%', icon: 'bar-chart-2', color: 'purple' },
                { label: 'Best Score', value: '88%', icon: 'trophy', color: 'amber' },
                { label: 'Hours Practiced', value: '9.5h', icon: 'clock', color: 'teal' },
            ];
            const notifications = [
                { label: 'Weekly Progress Report', desc: 'Receive an AI summary every Monday', on: true },
                { label: 'Session Reminders', desc: 'Remind me to practice daily', on: false },
                { label: 'New Feature Updates', desc: 'Get notified about new Hirelytics features', on: true },
            ];
            const [notifState, setNotifState] = useState(notifications.map(n => n.on));

            return (
                <div className="p-8 lg:p-10 max-w-5xl mx-auto w-full animate-fade-in">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Your Profile</h2>
                        <p className="text-slate-500 mt-1 font-medium">Manage your account and preferences</p>
                    </div>

                    {/* Profile Card */}
                    <div className="glass-card p-6 flex flex-col sm:flex-row items-start sm:items-center gap-6 mb-6 border-2 border-brand-100/50">
                        <div className="relative shrink-0">
                            <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-400 to-accent-purple flex items-center justify-center text-white text-3xl font-black shadow-lg select-none">AJ</div>
                            <button className="absolute -bottom-2 -right-2 w-7 h-7 bg-white rounded-lg shadow-md border border-slate-200 flex items-center justify-center text-brand-600 hover:bg-brand-50 transition-colors">
                                <Icon name="camera" size={13} />
                            </button>
                        </div>
                        <div className="flex-1">
                            <h3 className="text-xl font-bold text-slate-800">Alex Johnson</h3>
                            <p className="text-slate-500 text-sm font-medium">Frontend Developer · alex.johnson@email.com</p>
                            <div className="flex gap-2 mt-3 flex-wrap">
                                <span className="text-[11px] font-bold bg-brand-100 text-brand-700 px-3 py-1 rounded-full">Frontend</span>
                                <span className="text-[11px] font-bold bg-purple-100 text-purple-700 px-3 py-1 rounded-full">React</span>
                                <span className="text-[11px] font-bold bg-teal-100 text-teal-700 px-3 py-1 rounded-full">Node.js</span>
                            </div>
                        </div>
                        <button onClick={() => setEditMode(!editMode)} className="px-4 py-2 border border-brand-300 text-brand-700 font-bold rounded-xl hover:bg-brand-50 transition-colors text-sm flex items-center gap-2">
                            <Icon name="edit-3" size={15} />{editMode ? 'Cancel' : 'Edit Profile'}
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        {stats.map((s, i) => (
                            <motion.div key={i} whileHover={{ y: -3 }} className="glass-card p-4 flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${s.color === 'brand' ? 'bg-brand-50 text-brand-600' : s.color === 'purple' ? 'bg-purple-50 text-purple-600' : s.color === 'amber' ? 'bg-amber-50 text-amber-600' : 'bg-teal-50 text-teal-600'}`}>
                                    <Icon name={s.icon} size={18} />
                                </div>
                                <div>
                                    <p className="text-lg font-black text-slate-800">{s.value}</p>
                                    <p className="text-[11px] text-slate-500 font-medium">{s.label}</p>
                                </div>
                            </motion.div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Account Info */}
                        <div className="glass-card p-6">
                            <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="user" size={16} className="text-brand-600" />Account Information</h4>
                            <div className="flex flex-col gap-4">
                                {[['Full Name', 'Alex Johnson'], ['Email', 'alex.johnson@email.com'], ['Role', 'Frontend Developer'], ['Experience', '3 Years']].map(([label, val]) => (
                                    <div key={label}>
                                        <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">{label}</label>
                                        {editMode
                                            ? <input defaultValue={val} className="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-1 focus:ring-brand-200 outline-none text-sm font-medium text-slate-700 bg-white/70" />
                                            : <p className="text-sm font-semibold text-slate-700">{val}</p>
                                        }
                                    </div>
                                ))}
                                {editMode && <button className="mt-1 py-2 bg-gradient-to-r from-brand-500 to-accent-teal text-white rounded-xl font-bold text-sm">Save Changes</button>}
                            </div>
                        </div>

                        {/* Notifications */}
                        <div className="glass-card p-6">
                            <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="bell" size={16} className="text-brand-600" />Notifications</h4>
                            <div className="flex flex-col gap-4">
                                {notifications.map((n, i) => (
                                    <div key={i} className="flex items-center justify-between gap-4">
                                        <div>
                                            <p className="text-sm font-bold text-slate-700">{n.label}</p>
                                            <p className="text-xs text-slate-500 font-medium">{n.desc}</p>
                                        </div>
                                        <button onClick={() => setNotifState(s => s.map((v, idx) => idx === i ? !v : v))}
                                            className={`w-11 h-6 rounded-full transition-colors shrink-0 relative ${notifState[i] ? 'bg-brand-500' : 'bg-slate-300'}`}>
                                            <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${notifState[i] ? 'translate-x-5' : 'translate-x-0.5'}`}></span>
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <div className="border-t border-slate-100 mt-5 pt-5">
                                <h4 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Icon name="shield" size={16} className="text-brand-600" />Subscription</h4>
                                <div className="flex items-center justify-between bg-gradient-to-r from-brand-50 to-purple-50 rounded-xl p-3 border border-brand-100">
                                    <div>
                                        <p className="font-bold text-slate-800 text-sm">Free Plan</p>
                                        <p className="text-xs text-slate-500 font-medium">5 uploads / month · Basic AI</p>
                                    </div>
                                    <button className="text-xs font-bold text-white bg-gradient-to-r from-brand-500 to-accent-purple px-3 py-1.5 rounded-lg shadow-sm">Upgrade</button>
                                </div>
                            </div>

                            <div className="border-t border-slate-100 mt-5 pt-5">
                                <button className="flex items-center gap-2 text-sm font-bold text-red-500 hover:text-red-700 transition-colors">
                                    <Icon name="trash-2" size={15} />Delete Account
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentView, setCurrentView] = useState('login');
            const [selectedIssue, setSelectedIssue] = useState(null);

            const handleTabChange = (tabId) => {
                setActiveTab(tabId);
                setCurrentView(tabId);
            };

            const handleLogin = () => {
                setCurrentView('upload');
                setActiveTab('dashboard');
            };

            const handleLogout = () => {
                setCurrentView('login');
                setActiveTab('dashboard');
            };

            if (currentView === 'login') {
                return <LoginView onLogin={handleLogin} />;
            }

            return (
                <div className="flex min-h-screen">
                    <Sidebar activeTab={activeTab} setActiveTab={handleTabChange} onLogout={handleLogout} />

                    <main className="flex-1 ml-64 flex flex-col transition-all">
                        {currentView === 'upload' && (
                            <UploadView onUpload={() => setCurrentView('dashboard')} />
                        )}
                        {currentView === 'progress' && (
                            <ProgressView />
                        )}
                        {currentView === 'history' && (
                            <HistoryView />
                        )}
                        {currentView === 'levelup' && (
                            <LevelUpView />
                        )}
                        {currentView === 'profile' && (
                            <ProfileView />
                        )}
                        {currentView === 'dashboard' && (
                            <div className="p-8 lg:p-10 max-w-7xl mx-auto w-full animate-fade-in">
                                <TopHeader onUploadClick={() => setCurrentView('upload')} />

                                {/* Main Grid Layout */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                                    <Card title="Timeline Issues" icon="clock">
                                        <TimestampIssues onSelectIssue={setSelectedIssue} selectedIssue={selectedIssue} />
                                    </Card>

                                    <Card title="Selection Probability" icon="target">
                                        <SelectionPieChart />
                                    </Card>

                                    <div className="flex flex-col gap-4">
                                        <Card title="Pacing Trend" icon="trending-up" className="flex-1 min-h-0 !p-4 !pb-2">
                                            <PacingTrendChart />
                                        </Card>
                                        <Card title="Pause Analysis" icon="pause-circle" className="flex-1 min-h-0 !p-4 !pb-2">
                                            <PauseAnalysisChart />
                                        </Card>
                                    </div>

                                    {/* Hero AI Component Spanning Full Width */}
                                    <AIInsights selectedIssue={selectedIssue} />

                                    <Card title="Top Weaknesses" icon="alert-circle">
                                        <WeaknessesChart />
                                    </Card>

                                    <Card title="Energy Over Time" icon="activity">
                                        <EnergyAreaChart />
                                    </Card>

                                    <div className="glass-card p-6 flex flex-col justify-center items-center text-center gap-4 col-span-1 md:col-span-2 lg:col-span-1">
                                        <div className="drop-shadow-md animate-bounce py-2 select-none" style={{ fontSize: '56px' }}>
                                            🌸
                                        </div>
                                        <h3 className="font-bold text-xl text-slate-800">You're Improving!</h3>
                                        <p className="text-slate-500 text-sm">Filler words decreased by 15% since last session. Keep it up!</p>
                                        <button onClick={() => { setCurrentView('history'); setActiveTab('history'); }} className="mt-2 text-brand-600 font-semibold text-sm flex items-center gap-1 hover:text-brand-800">
                                            View detailed history <Icon name="arrow-right" size={16} />
                                        </button>
                                    </div>

                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Render App
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);

    </script>
</body>

</html>
